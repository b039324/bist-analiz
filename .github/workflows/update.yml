name: Hisse Verisi Guncelle
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p data
          for sym in THYAO AKBNK GARAN ASELS EREGL PETKM SASA BIMAS ISCTR; do
            curl -s "https://query1.finance.yahoo.com/v8/finance/chart/${sym}.IS?interval=1d&range=60d" -o data/${sym}.json
          done
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Veri guncellendi
