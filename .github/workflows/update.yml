name: Hisse Verisi Guncelle
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Veri Cek
        run: |
          python -c "
          import requests, json, os
          headers = {'User-Agent': 'Mozilla/5.0'}
          url = 'https://query1.finance.yahoo.com/v8/finance/chart/THYAO.IS?interval=1d&range=60d'
          r = requests.get(url, headers=headers)
          os.makedirs('data', exist_ok=True)
          with open('data/THYAO.json', 'w') as f:
              json.dump(r.json(), f)
          print('THYAO verisi guncellendi')
          "
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Veri guncellendi
